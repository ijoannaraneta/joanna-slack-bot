name: Slack bot schedulers

on:
  schedule:
    - cron: "*/5 * * * *"   # status sync
    - cron: "0 7 * * 1-5"   # weekday morning agenda (07:00 UTC = 8am UK summer time)
  workflow_dispatch: {}

jobs:
  sync:
    if: github.event.schedule != '0 7 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        env:
          SYNC_URL: ${{ secrets.SYNC_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SYNC_URL" ]; then
            echo "SYNC_URL secret not set yet — skipping."
            exit 0
          fi
          curl --fail --silent --show-error \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SYNC_URL/api/sync"

  agenda:
    if: github.event.schedule == '0 7 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - name: Call agenda endpoint
        env:
          SYNC_URL: ${{ secrets.SYNC_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SYNC_URL" ]; then
            echo "SYNC_URL secret not set yet — skipping."
            exit 0
          fi
          curl --fail --silent --show-error \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SYNC_URL/api/agenda"
